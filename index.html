<!DOCTYPE html>
<html>
<head>
  <title>Women's Health AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Women's Health AI</h1>
  <p>Private • Safe • AI Assisted</p>
</header>

<div class="container">

  <!-- FORM -->
  <div id="formCard" class="card">
    <h2>Basic Details</h2>

    <input id="age" placeholder="Age">
    <input id="height" placeholder="Height (cm)">
    <input id="weight" placeholder="Weight (kg)">

    <button onclick="startQuiz()">Start Health Check</button>
  </div>

  <!-- QUIZ -->
  <div id="quizCard" class="card hidden"></div>

  <!-- RESULT -->
  <div id="resultCard" class="card hidden"></div>

  <!-- CHAT -->
  <div class="card">
    <h3>Ask AI</h3>
    <input id="chatInput" placeholder="Type your question...">
    <button onclick="chat()">Ask</button>
    <button onclick="startVoice()">🎤 Speak</button>
    <p id="chatOutput"></p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
