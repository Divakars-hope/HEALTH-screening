<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Health AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header>
    <h1>Health AI</h1>
    <p>Women's Smart Screening</p>
  </header>

  <!-- Section Buttons -->
  <div class="sections">
    <button onclick="startSection('PCOD')">PCOD</button>
    <button onclick="startSection('Breast')">Breast</button>
    <button onclick="startSection('UTI')">UTI</button>
  </div>

  <!-- Question -->
  <div id="questionBox"></div>

  <!-- Result -->
  <div id="result"></div>

  <!-- Chat -->
  <div class="chat">
    <div id="chatBox"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Describe your symptoms..." />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
