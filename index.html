<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women's Health AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header>
    <h1>Women's Health AI</h1>
    <p class="sub">Smart Screening & Guidance</p>
  </header>

  <!-- Floating Symbol -->
  <div class="floating">♀</div>

  <!-- Language -->
  <div class="top-bar">
    <button onclick="setLanguage('en')">EN</button>
    <button onclick="setLanguage('ta')">தமிழ்</button>
  </div>

  <!-- Sections -->
  <div class="card-container">
    <div class="card" onclick="startSection('PCOD')">PCOD</div>
    <div class="card" onclick="startSection('Breast')">Breast</div>
    <div class="card" onclick="startSection('UTI')">UTI</div>
  </div>

  <div id="questionBox" class="question-box"></div>
  <div id="result"></div>

  <!-- Chat -->
  <div class="chat-section">
    <h3>Ask AI</h3>
    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input id="userInput" placeholder="Type symptoms..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <footer>
    This tool is for awareness only. Not a medical diagnosis.
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
